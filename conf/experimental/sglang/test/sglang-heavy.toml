name = "sglang-heavy"
description = "Heavy SGLang multi-node correctness benchmark"
test_template_name = "sglang"

[cmd_args]
docker_image_url = "lmsysorg/sglang:dev-cu13"
model = "Qwen/Qwen3-8B"

[bench_cmd_args]
dataset_name = "random"
num_prompts = 512
max_concurrency = 64
random_input = 512
random_output = 512
warmup_requests = 2
random_range_ratio = 1.0
output_details = true

[semantic_eval_cmd_args]
entrypoint = "python3 -m sglang.test.run_eval"
cli = "--host {host} --port {port} --eval-name gsm8k --num-examples 200 --num-threads 128 --model {model}"

[extra_env_vars]
UCX_NET_DEVICES = "all"
UCX_TLS = "^gdr_copy,cuda_ipc"
