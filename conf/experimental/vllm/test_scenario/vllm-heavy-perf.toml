name = "vllm-heavy-perf-multinode"

[[Tests]]
id = "vllm.heavy.perf.disagg.8nodes.4p4d"
test_name = "vllm"
num_nodes = 8
time_limit = "02:00:00"

  [Tests.cmd_args]
  model = "Qwen/Qwen3-32B"

    [Tests.cmd_args.prefill]
    num_nodes = 4
    gpu_ids = "0,1,2,3"
    enforce_eager = ""
    tensor_parallel_size = 16
    max_num_batched_tokens = 16384
    max_model_len = 16384

    [Tests.cmd_args.decode]
    num_nodes = 4
    gpu_ids = "0,1,2,3"
    enforce_eager = ""
    tensor_parallel_size = 16
    max_num_batched_tokens = 16384
    max_model_len = 16384
