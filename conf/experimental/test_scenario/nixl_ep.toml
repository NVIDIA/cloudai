[[Tests]]
id = "NIXL.EP.Expansion-contraction"
num_nodes = 2
time_limit = "00:10:00"

name = "NIXL.EP.Expansion-contraction"
description = "NIXL EP Example: Expansion-contraction plan (elasticity testing)"
