name = "vLLM"
description = "vLLM backend"
test_template_name = "AIDynamo"
extra_container_mounts = ["/run/udev:/run/udev"]
dse_excluded_args = ["cmd_args.aiperf_phases"]

[cmd_args]
docker_image_url = "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1"
workloads = "aiperf.sh"

  [cmd_args.dynamo]
  backend = "vllm"
  model = "Qwen/Qwen3-0.6B"
  ingress-cmd = "python -m dynamo.frontend --router-mode kv --router-reset-states"

    [cmd_args.dynamo.prefill_worker]
    num-nodes = 1
    cmd = 'python3 -m dynamo.vllm --is-prefill-worker'
    worker-initialized-regex = 'VllmWorker.*has.been.initialized'
    extra-args = "--no-enable-expert-parallel"

      [cmd_args.dynamo.prefill_worker.args]
      gpu-memory-utilization = 0.8
      tensor-parallel-size = 8
      pipeline-parallel-size = 1
      data-parallel-size = 1
      kv-transfer-config = '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'

    [cmd_args.dynamo.decode_worker]
    num-nodes = 1
    cmd = 'python3 -m dynamo.vllm'
    worker-initialized-regex = 'VllmWorker.*has.been.initialized'
    extra-args = "--no-enable-expert-parallel"

      [cmd_args.dynamo.decode_worker.args]
      gpu-memory-utilization = 0.8
      tensor-parallel-size = 8
      pipeline-parallel-size = 1
      data-parallel-size = 1
      kv-transfer-config = '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'

  [cmd_args.lmcache_controller]
  cmd = "lmcache_controller --host 0.0.0.0 --port 9000 --monitor-port 9001"

  [cmd_args.genai_perf]
  cmd = "genai-perf profile"
  extra-args = "--streaming --verbose -- -v --async"

    [cmd_args.genai_perf.args]
    endpoint-type = "chat"
    extra-inputs = 'min_tokens:10'
    output-tokens-mean = 500
    output-tokens-stddev = 0
    random-seed = 123
    request-count = 50
    synthetic-input-tokens-mean = 300
    synthetic-input-tokens-stddev = 0
    warmup-request-count = 5
    concurrency = 2

  [cmd_args.aiperf]
  health-check-between-phases = true
  continue-on-phase-failure = false
    [cmd_args.aiperf.args]
    concurrency = 2
    endpoint-type = "chat"
    extra-inputs = '{"min_tokens":10}'
    output-tokens-mean = 500
    request-count = 50
    server-metrics = "auto"
    streaming = true
    synthetic-input-tokens-mean = 300

  [[cmd_args.aiperf_phases]]
  name = "round_1"

    [cmd_args.aiperf_phases.args]
    concurrency = 2
    request-count = 50

  [[cmd_args.aiperf_phases]]
  name = "round_2"

    [cmd_args.aiperf_phases.args]
    concurrency = 4
    request-count = 50
    streaming = false

  [cmd_args.aiperf_accuracy]
  entrypoint = "aiperf profile"
  setup-cmd = "python -m pip install --break-system-packages --upgrade aiperf==0.8.0"
  cli = '''
--model {model}
--url {url}
--endpoint-type chat
--streaming
--artifact-dir {artifact_dir}
--no-server-metrics
--accuracy-benchmark mmlu
--accuracy-n-shots 5
--accuracy-tasks abstract_algebra
--concurrency 10
--extra-inputs '{"temperature":0,"stop":["\n"],"chat_template_kwargs":{"enable_thinking":false}}'
--num-requests 100
'''

[extra_env_vars]
UCX_LOG_LEVEL = "warn"
HF_HUB_OFFLINE = "0"
TRANSFORMERS_OFFLINE = "0"
HF_DATASETS_OFFLINE = "0"
DYNAMO_NODELIST = "$(scontrol show hostname $SLURM_JOB_NODELIST | tr -s '\\n' ',')"
UCX_TLS = "all"
